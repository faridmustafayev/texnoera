version: "3.8"

services:
  texnoera_postgres:
    container_name: ms_texnoera_postgres
    image: "postgres:latest"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - ms_texnoera_postgres_data:/var/lib/postgresql/data

volumes:
  ms_texnoera_postgres_data: